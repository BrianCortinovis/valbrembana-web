<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Categoria – Val Brembana Web</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --red: #c0392b; --dark: #111; --mid: #333; --light: #f4f4f4; --white: #fff; --border: #ddd; --text: #1a1a1a; --text2: #555; --muted: #666; --max: 1280px; }
  body { font-family: 'Georgia', 'Times New Roman', serif; background: #f0ede8; color: var(--text); }
  a { text-decoration: none; color: inherit; }
  img { display: block; max-width: 100%; }

  .site-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 12px 24px; background: var(--dark);
    border-bottom: 3px solid var(--red);
  }
  .site-header .banner-slot { flex: 1; max-width: 320px; }
  .site-header .banner-slot img { width: 100%; height: 90px; object-fit: cover; border-radius: 4px; }
  .site-header .logo-center { flex: 2; text-align: center; }
  .site-header .logo-center img { max-height: 70px; margin: 0 auto 4px; }
  .site-header .logo-center .site-title {
    font-family: 'Roboto', Arial, sans-serif; font-size: 2rem; font-weight: 900;
    letter-spacing: 2px; color: var(--white); text-transform: uppercase;
  }
  .site-header .logo-center .site-tagline { font-size: 0.75rem; color: #999; text-transform: uppercase; letter-spacing: 1px; }
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(17,17,17,0.92); backdrop-filter: blur(8px);
    border-bottom: 2px solid var(--red);
  }
  .topbar nav {
    max-width: var(--max); margin: 0 auto;
    display: flex; align-items: center; justify-content: center; flex-wrap: wrap;
  }
  .topbar nav a {
    display: block; color: #eee; font-size: 0.82rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; padding: 13px 18px;
    transition: background 0.2s, color 0.2s;
  }
  .topbar nav a:hover, .topbar nav a.active { background: var(--red); color: var(--white); }
  .topbar nav a.search-toggle { display: flex; align-items: center; padding: 13px 14px; }

  .page-header {
    background: #111; padding: 40px 20px 28px; text-align: center;
    border-bottom: 3px solid var(--red);
  }
  .page-header h1 { color: #fff; font-size: 32px; font-weight: bold; }
  .page-header p { color: #888; font-family: Arial, sans-serif; font-size: 13px; margin-top: 6px; text-transform: uppercase; letter-spacing: 2px; }

  @media (max-width: 1024px) { .site-header .banner-slot { display: none; } .topbar nav a { padding: 10px 12px; font-size: 0.75rem; } .news-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 640px) { .site-header { flex-direction: column; padding: 10px 16px; } .site-header .logo-center .site-title { font-size: 1.3rem; } .topbar nav a { padding: 8px 10px; font-size: 0.7rem; } .news-grid { grid-template-columns: 1fr; } }

  .main { max-width: 1200px; margin: 0 auto; padding: 28px 20px; }

  .news-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .news-card {
    background: #fff; border: 1px solid var(--border); border-radius: 3px;
    overflow: hidden; cursor: pointer; transition: box-shadow 0.2s, transform 0.2s;
    text-decoration: none; color: inherit;
  }
  .news-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.1); transform: translateY(-2px); }
  .news-card img { width: 100%; height: 150px; object-fit: cover; display: block; }
  .news-card .nc-body { padding: 12px 14px; }
  .news-card .cat { font-family: Arial, sans-serif; font-size: 10px; font-weight: 700; color: var(--red); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .news-card h3 { font-size: 15px; line-height: 1.4; font-weight: bold; margin-bottom: 6px; }
  .news-card .excerpt { font-family: Arial, sans-serif; font-size: 13px; color: var(--text2); line-height: 1.5; }
  .news-card .meta { font-family: Arial, sans-serif; font-size: 11px; color: #888; margin-top: 8px; border-top: 1px solid #eee; padding-top: 8px; }

  .loading { text-align: center; padding: 60px 20px; font-family: Arial, sans-serif; color: var(--text2); }

  footer { background: #111; color: #888; padding: 20px; text-align: center; font-family: Arial, sans-serif; font-size: 12px; margin-top: 40px; }
  footer a { color: var(--red); text-decoration: none; }

  @media (max-width: 768px) { .news-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="site-header">
  <div class="banner-slot">
    <a href="https://www.ezcape.it/?utm_source=valbrembanaweb" target="_blank" rel="noopener">
      <img src="images/banner-header.png" alt="eZcape.it">
    </a>
  </div>
  <div class="logo-center">
    <a href="index.html"><img src="images/logo-vbw-def.png" alt="Valbrembana Web logo"></a>
    <div class="site-title">Valbrembana Web</div>
    <div class="site-tagline">Il portale della Valle Brembana e delle Orobie</div>
  </div>
  <div class="banner-slot">
    <a href="#"><img src="images/banner-vintage.jpg" alt="Sponsor"></a>
  </div>
</header>

<div class="topbar">
  <nav>
    <a href="index.html">Home</a>
    <a href="notizie.html">Notizie</a>
    <a href="categoria.html?cat=cronaca">Cronaca</a>
    <a href="categoria.html?cat=in-evidenza">In Evidenza</a>
    <a href="categoria.html?cat=sport">Sport</a>
    <a href="categoria.html?cat=storie-e-personaggi">Storie</a>
    <a href="categoria.html?cat=eventi">Eventi</a>
    <a href="farmacie.html">Farmacie</a>
    <a href="#" class="search-toggle" onclick="event.preventDefault();document.getElementById('search-overlay').style.opacity=document.getElementById('search-overlay').style.opacity==='1'?'0':'1';document.getElementById('search-overlay').style.pointerEvents=document.getElementById('search-overlay').style.pointerEvents==='all'?'none':'all';" aria-label="Cerca">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </a>
  </nav>
</div>

<div id="search-overlay" style="position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;padding-top:120px;opacity:0;pointer-events:none;transition:opacity 0.25s;" onclick="if(event.target===this){this.style.opacity='0';this.style.pointerEvents='none';}">
  <div style="display:flex;width:90%;max-width:600px;background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.4);">
    <input type="text" id="search-input" placeholder="Cerca notizie..." autocomplete="off" style="flex:1;border:none;outline:none;padding:16px 20px;font-size:1rem;" onkeydown="if(event.key==='Enter')doSearchCat();if(event.key==='Escape'){var o=document.getElementById('search-overlay');o.style.opacity='0';o.style.pointerEvents='none';}">
    <button onclick="doSearchCat()" style="border:none;background:#c0392b;color:#fff;padding:0 20px;cursor:pointer;display:flex;align-items:center;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
  <div id="search-results" style="width:90%;max-width:600px;max-height:50vh;overflow-y:auto;margin-top:8px;border-radius:6px;"></div>
</div>

<div class="page-header">
  <h1 id="cat-title">Categoria</h1>
  <p id="cat-subtitle">Articoli</p>
</div>

<div class="main">
  <div class="news-grid" id="cms-cat-grid">
    <div class="loading">Caricamento articoli...</div>
  </div>
</div>

<footer>
  <p><a href="index.html">Val Brembana Web</a> &nbsp;·&nbsp; Portale della Valle Brembana e delle Orobie &nbsp;·&nbsp; &copy; 2026</p>
</footer>

<script src="cms-config.js"></script>
<script src="cms-loader.js"></script>
<script>
(async function() {
  var catSlug = new URLSearchParams(location.search).get("cat");
  if (!catSlug) { document.getElementById("cms-cat-grid").innerHTML = '<div class="loading">Nessuna categoria selezionata.</div>'; return; }

  // Try loading category JSON first, fallback to filtering all posts
  var articles = await cmsLoadCategory(catSlug);
  var catName = catSlug.charAt(0).toUpperCase() + catSlug.slice(1);

  if (!articles || articles.length === 0) {
    // Fallback: filter from all posts
    var all = await cmsLoadArticles();
    articles = all.filter(function(a) {
      return a.categories && a.categories[0] && a.categories[0].slug === catSlug;
    });
    if (articles.length > 0 && articles[0].categories && articles[0].categories[0]) {
      catName = articles[0].categories[0].name;
    }
  } else if (articles[0] && articles[0].categories && articles[0].categories[0]) {
    catName = articles[0].categories[0].name;
  }

  document.getElementById("cat-title").textContent = catName;
  document.getElementById("cat-subtitle").textContent = articles.length + " articoli";
  document.getElementById("page-title").textContent = catName + " – Val Brembana Web";

  var grid = document.getElementById("cms-cat-grid");
  grid.innerHTML = "";

  if (articles.length === 0) {
    grid.innerHTML = '<div class="loading">Nessun articolo in questa categoria.</div>';
    return;
  }

  articles.forEach(function(art) {
    var card = document.createElement("a");
    card.href = "articolo.html?slug=" + art.slug;
    card.className = "news-card";
    card.innerHTML = '<img src="' + (art.cover_image_url || CMS_PLACEHOLDER_IMG) + '" alt="' + art.title.replace(/"/g, '&quot;') + '">'
      + '<div class="nc-body">'
      + '<div class="cat">' + catName + '</div>'
      + '<h3>' + art.title + '</h3>'
      + '<p class="excerpt">' + (art.summary || "") + '</p>'
      + '<div class="meta">' + cmsFormatDateShort(art.published_at) + '</div>'
      + '</div>';
    grid.appendChild(card);
  });
})();

async function doSearchCat() {
  var q = document.getElementById('search-input').value.trim().toLowerCase();
  var results = document.getElementById('search-results');
  if (!q || q.length < 2) { results.innerHTML = ''; return; }
  var articles = await cmsLoadArticles();
  var found = articles.filter(function(a) {
    return (a.title && a.title.toLowerCase().indexOf(q) >= 0) || (a.summary && a.summary.toLowerCase().indexOf(q) >= 0);
  }).slice(0, 8);
  if (found.length === 0) { results.innerHTML = '<div style="padding:20px;text-align:center;background:#fff;border-radius:6px;color:#666;">Nessun risultato</div>'; return; }
  var html = '';
  found.forEach(function(a) {
    var cat = (a.categories && a.categories[0]) ? a.categories[0].name : '';
    html += '<a href="articolo.html?slug=' + a.slug + '" style="display:flex;gap:12px;padding:12px 16px;background:#fff;border-bottom:1px solid #eee;align-items:center;text-decoration:none;color:#1a1a1a;">'
      + '<img src="' + (a.cover_image_url || CMS_PLACEHOLDER_IMG) + '" style="width:60px;height:45px;object-fit:cover;border-radius:3px;" alt="">'
      + '<div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#c0392b;">' + cat + '</div>'
      + '<div style="font-size:13px;font-weight:700;line-height:1.3;">' + a.title + '</div></div></a>';
  });
  results.innerHTML = html;
}
document.getElementById('search-input').addEventListener('input', function() { clearTimeout(window._st); window._st = setTimeout(doSearchCat, 250); });
</script>
</body>
</html>
